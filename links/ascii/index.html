<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASCII Noodle Art</title>
    <style>
        body { background: #0b0b0b; color: #ffcc00; display: flex; justify-content: center; 
               align-items: center; height: 100vh; margin: 0; font-family: monospace; white-space: pre; }
        #display { font-size: 22px; line-height: 1.2; text-shadow: 0 0 10px #ffcc00; }
    </style>
</head>
<body>
<div id="display"></div>
<script>
    const display = document.getElementById('display');
    const steam = ["     ~  ~  ~     ", "    ~  ~  ~  ~    ", "     ~  ~  ~     "];
    const bowl = [
        "  (             )  ", "   (  S S S S  )   ", "    ( S S S S )    ",
        "   ____________   ", "  \\____________/  ", "   \\          /   ", "    \\________/    "
    ];

    let step = 0;
    const all = [...steam, ...bowl];
    let current = new Array(all.length).fill("");

    function draw() {
        if (step < all.length) {
            current[step] = all[step];
            display.innerText = current.join("\n");
            step++;
            setTimeout(draw, 150);
        } else { animate(); }
    }

    function animate() {
        let f = 0;
        setInterval(() => {
            f++;
            const sAnim = steam.map((l, i) => ((f + i) % 2 === 0 ? "  " : " ") + l.trim());
            const bAnim = bowl.map(l => l.includes('S') ? l.replace(/S/g, f % 2 === 0 ? '∫' : '§') : l);
            display.innerText = [...sAnim, ...bAnim].join("\n");
        }, 300);
    }
    draw();
</script>
</body>
</html>
